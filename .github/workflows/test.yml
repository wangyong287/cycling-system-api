name: 🐟 多鱼·E2E 后端测试

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: 后端 API E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cycling
          POSTGRES_PASSWORD: cycling_test_pwd
          POSTGRES_DB: cycling_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cycling -d cycling_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 安装依赖
        run: npm ci

      - name: 🔨 编译
        run: npm run build

      - name: 🗄️ 初始化测试库（装 psql + 跑 init.sql）
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=cycling_test_pwd psql -h localhost -U cycling -d cycling_test -f scripts/init.sql

      - name: 🚀 起 nest 后端（写 .env + 等就绪）
        run: |
          cat > .env <<EOF
          NODE_ENV=test
          DB_HOST=localhost
          DB_PORT=5432
          DB_USERNAME=cycling
          DB_PASSWORD=cycling_test_pwd
          DB_DATABASE=cycling_test
          DB_SYNCHRONIZE=false
          DB_LOGGING=false
          REDIS_HOST=localhost
          REDIS_PORT=6379
          JWT_SECRET=ci-jwt-secret-do-not-use-in-prod
          EOF
          nohup node dist/main.js > /tmp/nest.log 2>&1 &
          echo "NEST_PID=$!"
          for i in {1..60}; do
            if curl -s http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "✅ nest ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: 🧪 跑核心 API E2E
        run: bash scripts/start-test.sh

      - name: 📤 上传 nest 日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nest-logs
          path: /tmp/nest.log
          if-no-files-found: ignore
